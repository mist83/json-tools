name: Deploy Static Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  MULLMANIA_SITE_CONFIG: mullmania.site.json

jobs:
  deploy-mullmania:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load site config
        id: config
        run: |
          node <<'NODE'
          const fs = require('fs');
          const config = JSON.parse(fs.readFileSync(process.env.MULLMANIA_SITE_CONFIG, 'utf8'));
          const output = process.env.GITHUB_OUTPUT;

          function setOutput(name, value) {
            fs.appendFileSync(output, name + '<<__EOF__\n' + String(value ?? '') + '\n__EOF__\n');
          }

          setOutput('node_version', config.nodeVersion || '');
          setOutput('dotnet_version', config.dotnetVersion || '');
          setOutput('install_command', config.installCommand || '');
          setOutput('build_command', config.buildCommand || '');
          setOutput('publish_dir', config.publishDir || '');
          NODE

      - name: Setup Node
        if: steps.config.outputs.node_version != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.config.outputs.node_version }}

      - name: Setup .NET
        if: steps.config.outputs.dotnet_version != ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ steps.config.outputs.dotnet_version }}

      - name: Install dependencies
        if: steps.config.outputs.install_command != ''
        run: ${{ steps.config.outputs.install_command }}

      - name: Build
        if: steps.config.outputs.build_command != ''
        run: ${{ steps.config.outputs.build_command }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy site to Mullmania
        run: node scripts/deploy-mullmania-site.mjs apply --config ${{ env.MULLMANIA_SITE_CONFIG }}

  deploy-github-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.pages_deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load site config
        id: config
        run: |
          node <<'NODE'
          const fs = require('fs');
          const config = JSON.parse(fs.readFileSync(process.env.MULLMANIA_SITE_CONFIG, 'utf8'));
          const output = process.env.GITHUB_OUTPUT;

          function setOutput(name, value) {
            fs.appendFileSync(output, name + '<<__EOF__\n' + String(value ?? '') + '\n__EOF__\n');
          }

          setOutput('node_version', config.nodeVersion || '');
          setOutput('dotnet_version', config.dotnetVersion || '');
          setOutput('install_command', config.installCommand || '');
          setOutput('build_command', config.buildCommand || '');
          setOutput('publish_dir', config.publishDir || '');
          NODE

      - name: Setup Node
        if: steps.config.outputs.node_version != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.config.outputs.node_version }}

      - name: Setup .NET
        if: steps.config.outputs.dotnet_version != ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ steps.config.outputs.dotnet_version }}

      - name: Install dependencies
        if: steps.config.outputs.install_command != ''
        run: ${{ steps.config.outputs.install_command }}

      - name: Build
        if: steps.config.outputs.build_command != ''
        run: ${{ steps.config.outputs.build_command }}

      - name: Prepare GitHub Pages artifact
        run: node scripts/prepare-pages-artifact.mjs --source . --output "$RUNNER_TEMP/pages-artifact"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/pages-artifact

      - name: Deploy to GitHub Pages
        id: pages_deploy
        uses: actions/deploy-pages@v4
