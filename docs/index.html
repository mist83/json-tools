<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JSON Tools</title>
    <meta name="description" content="High-performance JSON scanning and indexing library">
    <script src="https://ui.mullmania.com/ui.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script>
      function currentVariant() {
        return new URLSearchParams(window.location.search).get('variant') || 'focus';
      }

      function setVariant(nextVariant) {
        const url = new URL(window.location.href);
        if (nextVariant === 'focus') {
          url.searchParams.delete('variant');
        } else {
          url.searchParams.set('variant', nextVariant);
        }
        window.location.assign(url.toString());
      }

      function linkButton(label, href, variant = 'secondary', icon = 'ti ti-arrow-up-right') {
        if (!href) {
          return null;
        }

        return UI.button({
          label,
          variant,
          icon,
          action: {
            type: 'open',
            href,
          },
        });
      }

      function proofImage(data) {
        return {
          tag: 'img',
          attrs: {
            src: data.posterPath,
            alt: data.title + ' proof asset',
            loading: 'eager',
          },
          style: {
            width: '100%',
            height: 'auto',
            display: 'block',
            borderRadius: '16px',
          },
        };
      }

      function focusSections(data) {
        const openButtons = [
          linkButton(data.liveLabel || 'Open live surface', data.liveUrl, 'primary', 'ti ti-player-play'),
          linkButton('Open Mullmania', data.mullmaniaUrl, data.liveUrl === data.mullmaniaUrl ? 'primary' : 'secondary', 'ti ti-world'),
          linkButton('Open GitHub front door', data.pagesUrl, 'secondary', 'ti ti-browser'),
          linkButton('View repo', data.githubUrl, 'secondary', 'ti ti-brand-github'),
        ].filter(Boolean);

        return [
          UI.section({
            eyebrow: 'Public Front Door',
            title: data.title,
            description: data.description,
            children: [
              UI.grid({
                columns: 2,
                children: [
                  UI.card({
                    title: 'Proof',
                    subtitle: data.posterNote,
                    body: proofImage(data),
                  }),
                  UI.card({
                    title: 'Open the actual thing',
                    subtitle: data.publishDir !== './docs'
                      ? 'Mullmania is wired to publish the repo surface, not just this front door.'
                      : 'This repo does not have a separate committed app surface yet, so the front door stays honest about that.',
                    body: UI.stack({
                      gap: 'sm',
                      children: [
                        UI.status({
                          label: data.publishDir !== './docs' ? 'Actual app publish path' : 'Front-door-only publish path',
                          tone: data.publishDir !== './docs' ? 'success' : 'warning',
                        }),
                        UI.text({
                          role: 'body',
                          text: 'Publish directory: ' + data.publishDir,
                        }),
                      ],
                    }),
                    actions: openButtons,
                  }),
                ],
              }),
            ],
          }),
          UI.section({
            eyebrow: 'Delivery',
            title: 'Shipping facts',
            children: [
              UI.grid({
                columns: 4,
                children: [
                  UI.stat({
                    label: 'Branch',
                    value: data.defaultBranch || 'main',
                    icon: 'ti ti-git-branch',
                  }),
                  UI.stat({
                    label: 'Mirror path',
                    value: data.publishDir,
                    icon: 'ti ti-world-upload',
                  }),
                  UI.stat({
                    label: 'Demo mode',
                    value: data.demoMode || 'unknown',
                    icon: 'ti ti-device-tv',
                  }),
                  UI.stat({
                    label: 'Poster',
                    value: data.posterKind === 'showcase-reel' ? 'real' : 'placeholder',
                    icon: 'ti ti-photo',
                    badge: {
                      label: data.posterKind === 'showcase-reel' ? 'evidence' : 'fallback',
                      tone: data.posterKind === 'showcase-reel' ? 'success' : 'warning',
                    },
                  }),
                ],
              }),
            ],
          }),
        ];
      }

      function evidenceSections(data) {
        return [
          UI.section({
            eyebrow: 'Evidence',
            title: 'Links and proof',
            children: [
              UI.table({
                columns: [
                  { key: 'label', label: 'Item' },
                  {
                    key: 'value',
                    label: 'Value',
                    render: (row) => row.href
                      ? {
                          tag: 'a',
                          attrs: {
                            href: row.href,
                            target: '_blank',
                            rel: 'noreferrer',
                          },
                          text: row.value,
                        }
                      : row.value,
                  },
                ],
                rows: [
                  { label: 'Repo', value: data.repo },
                  { label: 'GitHub', value: data.githubUrl, href: data.githubUrl },
                  { label: 'GitHub front door', value: data.pagesUrl, href: data.pagesUrl },
                  { label: 'Mullmania mirror', value: data.mullmaniaUrl, href: data.mullmaniaUrl },
                  ...(data.liveUrl ? [{ label: data.liveLabel || 'Live surface', value: data.liveUrl, href: data.liveUrl }] : []),
                  { label: 'Canonical artifacts', value: data.artifactBaseUrl, href: data.artifactBaseUrl },
                  { label: 'Canonical poster', value: data.posterUrl, href: data.posterUrl },
                  { label: 'Canonical manifest', value: data.manifestUrl, href: data.manifestUrl },
                  { label: 'Local poster', value: data.posterPath, href: data.posterPath },
                  { label: 'Local manifest', value: data.manifestPath, href: data.manifestPath },
                  { label: 'Deploy mode', value: data.deployMode || 'unknown' },
                  { label: 'Wave', value: data.wave || 'unclassified' },
                  { label: 'Primary language', value: data.primaryLanguage || 'unknown' },
                ],
              }),
            ],
          }),
          UI.section({
            eyebrow: 'Poster',
            title: data.posterKind === 'showcase-reel' ? 'Real proof asset' : 'Fallback poster',
            description: data.posterNote,
            children: [
              proofImage(data),
              data.hasVideo
                ? UI.alert({
                    tone: 'success',
                    title: 'Video available',
                    message: 'A real demo video exists for this repo.',
                  })
                : UI.alert({
                    tone: 'info',
                    title: 'Video optional',
                    message: 'No demo video is published yet. The contract leaves the slot open without pretending otherwise.',
                  }),
            ],
            actions: [
              linkButton('Open poster', data.posterPath, 'secondary', 'ti ti-photo'),
              linkButton('Open manifest', data.manifestPath, 'secondary', 'ti ti-file-description'),
            ].filter(Boolean),
          }),
        ];
      }

      async function renderFrontDoor() {
        const response = await fetch('./frontdoor.json', { cache: 'no-store' });
        const data = await response.json();
        const variant = currentVariant();

        document.title = data.title + ' · mist83 front door';

        UI.mount('#app', {
          icon: 'ti ti-door-enter',
          title: data.title,
          subtitle: 'ui.mullmania.com dogfood front door. Switch views instead of inventing a second shell.',
          actions: [
            UI.button({
              label: 'Focus',
              variant: variant === 'focus' ? 'primary' : 'secondary',
              onClick: () => setVariant('focus'),
            }),
            UI.button({
              label: 'Evidence',
              variant: variant === 'evidence' ? 'primary' : 'secondary',
              onClick: () => setVariant('evidence'),
            }),
          ],
          sections: variant === 'evidence' ? evidenceSections(data) : focusSections(data),
        });
      }

      window.addEventListener('ui-ready', () => {
        renderFrontDoor().catch((error) => {
          console.error('[frontdoor] render failed', error);
          document.body.textContent = error.message || String(error);
        });
      });
    </script>
  </body>
</html>
