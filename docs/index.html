<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JSON Tools</title>
    <meta name="description" content="Interactive JSON scanner, validator, and path tools demo.">
    <script src="https://ui.mullmania.com/ui.js"></script>
  </head>
  <body>
    <!-- Managed by UI.frontdoor. Edit frontdoor.json, not this shell. -->
    <div id="app"></div>
    <script>
      window.addEventListener('ui-ready', () => {
        UI.frontdoor.mount('#app').catch((error) => {
          console.error('[frontdoor] render failed', error);
          document.body.textContent = error.message || String(error);
        });
      });
    </script>
  </body>
</html>
