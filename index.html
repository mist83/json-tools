<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JsonUtilities — High-Performance JSON Scanning & Indexing</title>
    <meta name="description" content="Interactive demo of JsonUtilities: byte-range scanning, JSON path extraction, Trie indexing, semantic search, and validation.">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230071CE' width='100' height='100' rx='4'/><text x='50' y='72' font-size='58' text-anchor='middle' fill='white' font-family='monospace' font-weight='bold'>{}</text></svg>">

    <link rel="stylesheet" href="https://ui.mikesendpoint.com/active/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        /* App-specific utilities not in the canonical framework */
        .text-sm { font-size: var(--text-sm); }
        .text-xs { font-size: var(--text-xs); }
        .gap-xs  { gap: var(--space-xs); }
        .mb-xs   { margin-bottom: var(--space-xs); }

        /* Header accent color for the "Utilities" wordmark */
        .header-accent { color: var(--color-secondary); }

        /* Header right-side badge row */
        .header-badges {
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: max-content;
            gap: var(--space-sm);
            align-items: center;
        }

        @media (max-width: 960px) {
            .header {
                grid-template-columns: 1fr;
                gap: var(--space-md);
                align-items: start;
            }

            .header-badges {
                grid-auto-flow: row;
                grid-template-columns: repeat(2, minmax(0, max-content));
                justify-content: start;
            }
        }

        @media (max-width: 560px) {
            .header-badges {
                grid-template-columns: minmax(0, 1fr);
            }
        }

        /* Clipboard fallback textarea — off-screen, not visible */
        .clipboard-fallback {
            position: fixed;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- ── Header ──────────────────────────────────────────────── -->
        <div class="header">
            <h1>
                <i class="ti ti-braces"></i>
                <span>Json<span class="header-accent">Utilities</span></span>
            </h1>
            <div class="header-badges">
                <span class="status-badge status-info"><i class="ti ti-brand-github"></i> mist83/json-tools</span>
                <span class="status-badge status-enabled"><i class="ti ti-check"></i> 117 tests passing</span>
                <span class="status-badge status-warning"><i class="ti ti-bolt"></i> .NET 8 · Zero-alloc</span>
                <span class="status-badge status-info" id="execution-mode-badge"><i class="ti ti-switch-3"></i> Auto mode</span>
            </div>
        </div>

        <!-- ── Tabs ────────────────────────────────────────────────── -->
        <div id="tabs-container" class="tabs"></div>

        <!-- ── Content ────────────────────────────────────────────── -->
        <div id="content-container"></div>

    </div><!-- /container -->

    <script src="https://ui.mikesendpoint.com/js/ui.js"></script>
    <script src="plugin-registry.js"></script>
    <script src="data-generator.js"></script>
    <script src="app.js"></script>

    <script>
        window.addEventListener('ui-ready', async () => {
            const sitemap = {
                tabs: [
                    { id: 'home',  label: 'Home',  icon: 'ti ti-home',        htmlSource: '/tabs/home.html' },
                    { id: 'tools', label: 'Tools', icon: 'ti ti-tool',        htmlSource: '/tabs/tools.html' },
                    { id: 'about', label: 'About', icon: 'ti ti-info-circle', htmlSource: '/tabs/about.html' }
                ]
            };

            window._tabsEverywhere = new TabsEverywhere({
                tabsContainerId: 'tabs-container',
                contentContainerId: 'content-container',
                sitemap
            });

            // Expose on window.UI.tabs BEFORE init() so the hashchange
            // handler that fires during init can call loadTab without crashing
            window.UI.tabs = window._tabsEverywhere;

            await window._tabsEverywhere.init();

            // Bootstrap app after first tab is loaded
            initApp();
        });
    </script>
</body>
</html>
